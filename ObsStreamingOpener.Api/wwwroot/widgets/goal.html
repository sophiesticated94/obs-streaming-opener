<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OBS Goal</title>
  <link rel="stylesheet" href="/widgets/widgets.css">
</head>
<body>
  <main class="widget">
    <section class="goal">
      <div class="label" id="goalLabel">Support goal</div>
      <span id="goalValue" class="value">0 / 1000</span>
      <div class="bar"><div id="goalFill" class="fill"></div></div>
    </section>
  </main>
  <script type="module">
    import { applyTheme, formatNumber, getJson, query } from "/widgets/shared.js";
    import { connectWidgetHub } from "/widgets/realtime.js";

    applyTheme();
    const target = Number(query("target", "1000"));
    const label = query("label", "Support goal");
    const channelId = query("channelId", "");
    let value = 0;
    document.getElementById("goalLabel").textContent = label;

    function render() {
      const percent = target <= 0 ? 0 : Math.min(100, (value / target) * 100);
      document.getElementById("goalValue").textContent = `${formatNumber(value)} / ${formatNumber(target)}`;
      document.getElementById("goalFill").style.width = `${percent}%`;
    }

    async function init() {
      const data = await getJson(`/api/revenue/summary${channelId ? `?channelId=${channelId}` : ""}`);
      value = Number((data.currencies ?? [])[0]?.gross ?? 0);
      render();

      await connectWidgetHub({
        hubUrl: "/hubs/activity",
        channelId,
        handlers: {
          tipCreated: (tip) => {
            value += Number(tip.amount ?? 0);
            render();
          }
        }
      });
    }

    init().catch(console.error);
  </script>
</body>
</html>
