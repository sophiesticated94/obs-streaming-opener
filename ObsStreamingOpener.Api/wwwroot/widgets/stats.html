<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OBS Stream Stats</title>
  <link rel="stylesheet" href="/widgets/widgets.css">
</head>
<body>
  <main class="widget">
    <section class="stats-grid">
      <div class="metric"><span class="label">Viewers</span><span id="viewers" class="value">0</span></div>
      <div class="metric"><span class="label">Likes</span><span id="likes" class="value">0</span></div>
      <div class="metric"><span class="label">Chat/min</span><span id="chatRate" class="value">0</span></div>
      <div class="metric"><span class="label">Tips</span><span id="tips" class="value">0</span></div>
      <div class="metric"><span class="label">Audience</span><span id="audience" class="value">0</span></div>
      <div class="metric"><span class="label">Paid</span><span id="paidAudience" class="value">0</span></div>
    </section>
    <section class="event">
      <strong id="streamTitle">Current stream</strong>
      <p id="latestEvent" class="muted">Waiting for events</p>
      <span id="updated" class="muted"></span>
    </section>
  </main>
  <script type="module">
    import { applyTheme, formatNumber, getJson, query } from "/widgets/shared.js";
    import { connectWidgetHub } from "/widgets/realtime.js";

    applyTheme();
    const channelId = query("channelId", "");

    function applyStats(data) {
      document.getElementById("viewers").textContent = formatNumber(data.concurrentViewers);
      document.getElementById("likes").textContent = formatNumber(data.likes);
      document.getElementById("chatRate").textContent = formatNumber(data.chatMessagesPerMinute);
      document.getElementById("tips").textContent = formatNumber(data.tipTotal);
      document.getElementById("audience").textContent = formatNumber(data.audienceMemberCount);
      document.getElementById("paidAudience").textContent = formatNumber(data.paidAudienceMemberCount);
      document.getElementById("streamTitle").textContent = data.streamTitle ?? "Current stream";
    }

    async function init() {
      try {
        const data = await getJson(channelId ? `/api/channels/${channelId}/stats/current` : "/api/stats/current");
        applyStats(data);
      } catch (e) {
        console.error(e);
      }

      try {
        await connectWidgetHub({
          hubUrl: "/hubs/stats",
          channelId,
          handlers: { currentStats: applyStats }
        });
      } catch (e) {
        console.error("SignalR init failed", e);
      }
    }

    init();
  </script>
</body>
</html>
