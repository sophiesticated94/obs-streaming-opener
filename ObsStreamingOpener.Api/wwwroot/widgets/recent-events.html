<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OBS Recent Events</title>
  <link rel="stylesheet" href="/widgets/widgets.css">
</head>
<body>
  <main class="widget">
    <section id="events" class="event-list"></section>
  </main>
  <script type="module">
    import { applyTheme, formatMoney, getJson, query } from "/widgets/shared.js";
    import { connectWidgetHub } from "/widgets/realtime.js";

    applyTheme();
    const channelId = query("channelId", "");
    const limit = Math.min(Math.max(Number(query("limit", "10")), 1), 50);
    const events = [];

    function renderEvent(event) {
      const amount = event.amount ? formatMoney(event.amount, event.currency) : "";
      return `<article class="event">
        <strong>${event.actorName ?? event.provider}</strong>
        <p>${event.message ?? event.title ?? event.eventType}</p>
        <span class="muted">${amount}</span>
      </article>`;
    }

    function render() {
      document.getElementById("events").innerHTML = events.length
        ? events.map(renderEvent).join("")
        : `<article class="event"><strong>Ready</strong><p>Waiting for stream events</p><span class="muted"></span></article>`;
    }

    function addEvent(event) {
      if (!event?.id || events.some((item) => item.id === event.id)) {
        return;
      }

      events.unshift(event);
      events.splice(limit);
      render();
    }

    async function init() {
      const data = await getJson(channelId
        ? `/api/channels/${channelId}/events/recent?limit=${limit}`
        : `/api/events/recent?limit=${limit}`);
      events.splice(0, events.length, ...(data ?? []));
      render();

      await connectWidgetHub({
        hubUrl: "/hubs/activity",
        channelId,
        handlers: { eventCreated: addEvent }
      });
    }

    init().catch(console.error);
  </script>
</body>
</html>
